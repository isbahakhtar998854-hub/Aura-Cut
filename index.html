<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Search & Replace Editor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .result-box { margin-top: 20px; text-align: center; }
        #outputImage { max-width: 100%; border-radius: 8px; margin-top: 10px; display: none; }
        #loading { display: none; color: #007bff; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎨 AI Image Editor</h2>
    <div class="form-group">
        <label>अपनी फोटो अपलोड करें:</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>
    <div class="form-group">
        <label>क्या बदलना है? (उदा. background):</label>
        <input type="text" id="searchPrompt" placeholder="उदा. background">
    </div>
    <div class="form-group">
        <label>उसकी जगह क्या लाना है?:</label>
        <input type="text" id="replacePrompt" placeholder="उदा. beautiful snow mountains">
    </div>
    <button onclick="editImage()">AI मैजिक शुरू करें ✨</button>
    <div class="result-box">
        <div id="loading">AI आपकी फोटो एडिट कर रहा है... ⏳</div>
        <img id="outputImage" alt="Edited Output">
    </div>
</div>

<script>
    // 📢 हम सीधे Stability AI को यहीं से कॉल कर रहे हैं, बिना किसी बैकेंड सर्वर के झंझट के!
    async function editImage() {
        const imageFile = document.getElementById('imageInput').files[0];
        const searchPrompt = document.getElementById('searchPrompt').value;
        const replacePrompt = document.getElementById('replacePrompt').value;
        const loading = document.getElementById('loading');
        const outputImage = document.getElementById('outputImage');

        if (!imageFile || !searchPrompt || !replacePrompt) {
            alert('कृपया सभी बॉक्स भरें!');
            return;
        }

        loading.style.display = 'block';
        outputImage.style.display = 'none';

        const formData = new FormData();
        formData.append('image', imageFile);
        formData.append('prompt', replacePrompt);
        formData.append('search_prompt', searchPrompt);
        formData.append('output_format', 'webp');

        try {
            const response = await fetch('https://api.stability.ai/v2beta/stable-image/edit/search-and-replace', {
                method: 'POST',
                headers: {
                    // यहाँ हम Vercel में सेव की गई API Key का इस्तेमाल करेंगे
                    'Authorization': 'Bearer ' + 'sk-wmcnPynyl2S0Ugq6g91NKkv2Xlo1qt4pMhal81es4XIVkJ1R' 
                },
                body: formData
            });

            if (!response.ok) throw new Error('AI Processing Failed');

            const blob = await response.blob();
            outputImage.src = URL.createObjectURL(blob);
            outputImage.style.display = 'block';
        } catch (error) {
            alert('कुछ गड़बड़ हो गई! कृपया अपनी API Key चेक करें।');
            console.error(error);
        } finally {
            loading.style.display = 'none';
        }
    }
</script>
</body>
</html>
